{% set name = "generic_parser" %}
{% set version = "1.1.2" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/generic_parser-{{ version }}.tar.gz
  sha256: 7fd698f70a0c90a1aac4dd597b1f160d8c7b2e732323cf49b1dea51dced222f0

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - generic_parser
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pylhc/generic_parser
  summary: A parser for arguments and config-files that also allows direct python input.
  license: MIT
  license_family: MIT
  license_file: LICENSE
  description: |
    A parser for arguments and config files that also allows direct Python input.
  doc_url: https://pylhc.github.io/generic_parser/

extra:
  recipe-maintainers:
    - fsoubelet
